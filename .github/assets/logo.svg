<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <!-- Glow filter for the waveform -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for the waveform bars -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- Gradient for text - works on both dark and light backgrounds -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Subtle ring gradient -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- === ICON GROUP (circular waveform visualizer) === -->
  <g transform="translate(90, 100)">
    <!-- Outer ring with pulse animation -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.3">
      <animate attributeName="r" values="58;62;58" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.5"/>

    <!-- Animated equalizer bars (center-aligned, symmetric) -->
    <g filter="url(#glow)">
      <!-- Bar 1 -->
      <rect x="-30" y="-4" width="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="height" values="8;28;14;32;8" dur="1.2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-4;-14;-7;-16;-4" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <!-- Bar 2 -->
      <rect x="-20" y="-4" width="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="height" values="8;36;20;12;8" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-4;-18;-10;-6;-4" dur="1.4s" repeatCount="indefinite"/>
      </rect>
      <!-- Bar 3 -->
      <rect x="-10" y="-4" width="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="height" values="8;42;16;38;8" dur="1.0s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-4;-21;-8;-19;-4" dur="1.0s" repeatCount="indefinite"/>
      </rect>
      <!-- Bar 4 (center, tallest) -->
      <rect x="0" y="-4" width="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="height" values="8;48;24;44;8" dur="0.9s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-4;-24;-12;-22;-4" dur="0.9s" repeatCount="indefinite"/>
      </rect>
      <!-- Bar 5 -->
      <rect x="10" y="-4" width="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="height" values="8;34;18;40;8" dur="1.1s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-4;-17;-9;-20;-4" dur="1.1s" repeatCount="indefinite"/>
      </rect>
      <!-- Bar 6 -->
      <rect x="20" y="-4" width="5" rx="2.5" fill="url(#barGrad)">
        <animate attributeName="height" values="8;24;30;10;8" dur="1.3s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-4;-12;-15;-5;-4" dur="1.3s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- === TEXT GROUP === -->
  <g transform="translate(170, 100)">
    <!-- "molex" text -->
    <text x="0" y="5" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="56" font-weight="700" letter-spacing="-2" fill="url(#textGrad)">
      molex
      <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
    </text>

    <!-- "Audio" text -->
    <text x="172" y="5" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="56" font-weight="300" letter-spacing="-2" fill="url(#textGrad)" opacity="0.75">
      Audio
      <animate attributeName="opacity" values="0;0.75" dur="0.8s" begin="0.3s" fill="freeze"/>
    </text>

    <!-- Tagline -->
    <text x="2" y="32" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="13" font-weight="400" letter-spacing="4" fill="#a78bfa" opacity="0">
      AUDIO PROCESSING TOOL
      <animate attributeName="opacity" values="0;0.6" dur="0.6s" begin="0.6s" fill="freeze"/>
    </text>
  </g>

  <!-- Decorative scanning line -->
  <line x1="0" y1="100" x2="600" y2="100" stroke="#7c3aed" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
