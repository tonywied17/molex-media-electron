---
name: ✨ Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make molexAudio better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      placeholder: What problem does this solve, or what workflow would it improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe the feature and how it would work
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Audio Processing
        - UI/UX
        - File Management
        - FFmpeg Integration
        - Settings/Configuration
        - Platform Support
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and feature requests
          required: true
